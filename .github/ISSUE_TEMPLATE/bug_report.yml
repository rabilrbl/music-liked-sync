name: Bug report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal commands or sequence that triggers the issue.
      placeholder: |
        1. music-liked-sync --apply
        2. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `music-liked-sync --help | head -1` or `uv pip show music-liked-sync`
      placeholder: e.g. 0.1.3
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.13.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04 / macOS 15 / Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or traceback (redact personal info).